<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js トレーニング</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>p5.js トレーニング</h1>
  </header>

  <main class="app-layout">
    <aside class="sidebar">
      <section>
        <h2 class="toggle-header" id="chapterToggle">章一覧 ▼</h2>
        <ul id="chapterList"></ul>
      </section>

      <section>
        <h2 class="toggle-header" id="problemToggle">問題一覧 ▼</h2>
        <ul id="problemList"></ul>
      </section>
    </aside>

    <section class="main-panel">
      <div class="problem-panel">
        <h2 id="problemTitle">問題タイトル</h2>
        <p id="problemDescription">ここに問題文が表示されます。</p>
      </div>

      <div id="editorArea" class="editor-panel">
        <div class="editor-header">コード入力</div>
        <textarea id="codeEditor"></textarea>
      </div>

      <div id="choiceArea" class="choice-panel hidden">
        <div class="choice-header">選択肢</div>
        <div id="choiceList"></div>
      </div>

      <div id="predictArea" class="predict-panel hidden">
        <div class="predict-header">回答入力</div>
        <input id="predictInput" type="text" placeholder="答えを入力してください" />
      </div>

      <div class="button-row">
        <button id="prevProblemButton">前の問題</button>
        <button id="nextProblemButton">次の問題</button>
        <button id="runButton">判定する</button>
        <button id="hintButton">ヒントを見る</button>
        <button id="answerButton" class="hidden">模範解答を見る</button>
        <button id="resetButton">リセット</button>
        <button id="historyPageButton" onclick="location.href='history.html'">履歴を見る</button>
      </div>

      <div id="resultPanel" class="result-panel result-neutral">
        <p id="resultMessage" class="result-status">未判定</p>
        <p id="explanationMessage" class="result-detail">ここに判定結果の詳細や解説が表示されます。</p>
      </div>

      <div class="hint-panel">
        <p id="hintMessage">ヒントはまだ表示されていません。</p>
      </div>
    </section>

    <section class="preview-panel">
      <div class="preview-box">
        <h2>あなたの実行結果</h2>
        <div id="previewCanvas"></div>
      </div>

      <div class="preview-box">
        <h2>正解の見本</h2>
        <div id="answerCanvas"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script src="js/state.js"></script>
  <script src="js/problemLoader.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/judge.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
